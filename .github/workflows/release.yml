name: Release platform packages

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version to release (for example 0.1.0)
        required: true

permissions:
  contents: read
  packages: write

jobs:
  flutter:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/flutter
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.41.0'
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test
      - run: dart pub publish --force
        env:
          PUB_CREDENTIALS: ${{ secrets.PUB_CREDENTIALS }}

  react:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/react
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: npm install --no-package-lock
      - run: npm run build
      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  compose:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/compose
    steps:
      - uses: actions/checkout@v4
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.11'
      - run: gradle :andura:publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  swift:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - run: swift test
      - run: swift package archive-source
