name: CI

on:
  push:
  pull_request:

jobs:
  flutter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.41.0'
      - run: dart format --output=none --set-exit-if-changed lib test example/lib
      - run: flutter analyze
      - run: flutter test
      - run: cd example && flutter analyze

  design-system:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: python3 scripts/generate_tokens.py
      - run: git diff --exit-code
      - run: python3 scripts/validate_design_system.py
